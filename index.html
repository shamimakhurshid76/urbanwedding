<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="UG3iyieNADM7hK1uCdGY0KguQsEvY_ThvstQQBNqgrY" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanWedding</title>

<meta name="google-site-verification" content="YOUR-CODE-HERE" />

<style>
body {
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
}

/* horizontal layout */
.container {
  display: flex;
  width: 400vw;
  height: 100vh;
}

.section {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.home { background: #111; color: white; }
.services { background: #f4f4f4; }
.gallery { background: #ddd; }
.contact { background: #000; color: white; }

.wrapper {
  height: 400vh;
}

.sticky {
  position: sticky;
  top: 0;
  overflow: hidden;
}

/* button */
.btn {
  padding: 12px 25px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* popup form */
.form-popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  z-index: 1000;
  width: 300px;
}

.form-popup input, .form-popup textarea {
  width: 100%;
  margin: 8px 0;
  padding: 8px;
}

.overlay {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="sticky">
    <div class="container" id="scrollContainer">

      <div class="section home">
        <div>
          <h1>UrbanWedding</h1>
          <p>Your Dream Wedding Planner</p>
          <button class="btn" onclick="openForm()">Book Now</button>
        </div>
      </div>

      <div class="section services">
        <div>
          <h2>Services</h2>
          <p>Decoration • Catering • Photography</p>
        </div>
      </div>

      <div class="section gallery">
        <h2>Gallery</h2>
      </div>

      <div class="section contact">
        <div>
          <h2>Contact Us</h2>
          <p>Book your wedding today</p>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- FORM -->
<div class="overlay" id="overlay" onclick="closeForm()"></div>

<div class="form-popup" id="form">
  <h3>Book Now</h3>
  <input type="text" placeholder="Your Name" required>
  <input type="tel" placeholder="Phone Number" required>
  <input type="date" required>
  <textarea placeholder="Address" required></textarea>
  <button class="btn">Submit</button>
  <button onclick="closeForm()">Close</button>
</div>

<script>
window.addEventListener("scroll", () => {
  const scroll = window.scrollY;
  document.getElementById("scrollContainer").style.transform = `translateX(-${scroll}px)`;
});

function openForm() {
  document.getElementById("form").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function closeForm() {
  document.getElementById("form").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
