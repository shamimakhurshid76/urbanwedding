<!DOCTYPE html>
<html lang="en">
<head>

<title>UrbanWedding | Wedding Planner</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* Horizontal scroll */
.wrapper { height: 400vh; }
.sticky { position: sticky; top: 0; overflow: hidden; }
.container {
  display: flex;
  width: 400vw;
  height: 100vh;
  transition: 0.3s;
}

.section {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* HOME */
.home {
  background: linear-gradient(135deg, #fff, #f7f7f7);
  color: #333;
}

/* SERVICES */
.services { background: #fafafa; }

/* GALLERY */
.gallery { background: #eee; }

/* CONTACT */
.contact { background: #111; color: white; }

/* Animations */
.fade { opacity: 0; transform: translateY(30px); }
.show { opacity: 1; transform: translateY(0); transition: 1s; }

/* Button */
.btn {
  padding: 12px 25px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* Services */
.services-box {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: white;
  padding: 15px;
  width: 220px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
  cursor: pointer;
}

.card img { width: 100%; border-radius: 10px; }

.desc { display: none; font-size: 14px; }

/* Gallery */
.gallery-box {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.gallery-box img {
  width: 200px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

/* Form */
.form-popup, .overlay {
  display: none;
  position: fixed;
}

.overlay {
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  top: 0;
}

.form-popup {
  background: white;
  padding: 20px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.form-popup input, .form-popup textarea {
  width: 100%;
  margin: 8px 0;
  padding: 8px;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="sticky">
<div class="container" id="scroll">

<!-- HOME -->
<div class="section home">
  <div class="fade">
    <h1>UrbanWedding</h1>
    <p>Plan your dream wedding with elegance</p>
    <button class="btn" onclick="openForm()">Book Now</button>
  </div>
</div>

<!-- SERVICES -->
<div class="section services">
  <div>
    <h2>Our Services</h2>
    <div class="services-box">

      <div class="card" onclick="toggle(this)">
        <img src="decoration.jpg">
        <h3>Decoration</h3>
        <p class="desc">Beautiful themes, floral designs and lighting.</p>
      </div>

      <div class="card" onclick="toggle(this)">
        <img src="catering.jpg">
        <h3>Catering</h3>
        <p class="desc">Delicious cuisines with premium service.</p>
      </div>

      <div class="card" onclick="toggle(this)">
        <img src="photography.jpg">
        <h3>Photography</h3>
        <p class="desc">Capture your moments professionally.</p>
      </div>

    </div>
  </div>
</div>

<!-- GALLERY -->
<div class="section gallery">
  <div>
    <h2>Gallery</h2>
    <div class="gallery-box">
      <img src="wedding1.jpg">
      <img src="wedding2.jpg">
      <img src="wedding3.jpg">
      <img src="wedding4.jpg">
    </div>
  </div>
</div>

<!-- CONTACT -->
<div class="section contact">
  <div>
    <h2>Contact Us</h2>
    <p>Book your wedding today</p>
  </div>
</div>

</div>
</div>
</div>

<!-- FORM -->
<div class="overlay" id="overlay" onclick="closeForm()"></div>

<div class="form-popup" id="form">
  <h3>Book Now</h3>
  <input type="text" placeholder="Name">
  <input type="tel" placeholder="Phone">
  <input type="date">
  <textarea placeholder="Address"></textarea>
  <button class="btn">Submit</button>
  <button onclick="closeForm()">Close</button>
</div>

<script>
window.addEventListener("scroll", () => {
  document.getElementById("scroll").style.transform =
    `translateX(-${window.scrollY}px)`;
});

/* Animation */
window.addEventListener("scroll", () => {
  document.querySelectorAll(".fade").forEach(el => {
    el.classList.add("show");
  });
});

/* Toggle description */
function toggle(card) {
  let d = card.querySelector(".desc");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

/* Form */
function openForm() {
  document.getElementById("form").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function closeForm() {
  document.getElementById("form").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
